kind = "web"
previewPath = "/app/"
title = "App"
version = "1.0.0"
id = "artifacts/app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [
  "/app/",
  "/file/service",
  "/im/service",
  "/monitor/app/service",
  "/bpm/service",
  "/es/service",
]
localPort = 23863

[services.development]
run = "pnpm --filter @workspace/app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/app", "run", "build" ]
publicDir = "artifacts/app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23863"
BASE_PATH = "/app/"
